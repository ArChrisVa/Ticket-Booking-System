# Phase 0 — Postgres + the Events service.
# More services (auth, booking, notification, gateway, rabbitmq) get added in later phases.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: tickets
    # Host 5433 -> container 5432. Host port is 5433 because a native PostgreSQL
    # already owns 5432 on this machine. Inside the Docker network Postgres is
    # still reached as postgres:5432, so the events service is unaffected.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema is applied automatically on first boot (empty volume only).
      # Re-apply after edits with: docker compose down -v && docker compose up --build
      - ./services/events/db/init:/docker-entrypoint-initdb.d:ro
    # Compose waits for this before starting services that depend_on it.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d tickets"]
      interval: 5s
      timeout: 5s
      retries: 5

  events:
    build: ./services/events
    # Shared JWT_SECRET (gitignored) so events can VERIFY tokens auth issued.
    env_file:
      - ./services/events/.env
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/tickets
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    # Mount source for hot-reload in dev (tsx watch). node_modules stays in the image.
    volumes:
      - ./services/events/src:/app/src

  # --- Auth service + its OWN Postgres (database-per-service, low coupling) ---
  auth-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: auth
    # Host 5434 -> container 5432 (5432 = native PG, 5433 = events PG).
    ports:
      - "5434:5432"
    volumes:
      - authpgdata:/var/lib/postgresql/data
      - ./services/auth/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build: ./services/auth
    # Loads JWT_SECRET (gitignored, local-only). Copy services/auth/.env.example
    # to services/auth/.env on a fresh checkout.
    env_file:
      - ./services/auth/.env
    environment:
      DATABASE_URL: postgres://app:app@auth-postgres:5432/auth
      PORT: "3002"
    ports:
      - "3002:3002"
    depends_on:
      auth-postgres:
        condition: service_healthy
    volumes:
      - ./services/auth/src:/app/src

  # --- Booking service + its OWN Postgres (database-per-service, low coupling) ---
  booking-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: booking
    # Host 5435 -> container 5432 (5432 native, 5433 events, 5434 auth, 5435 booking).
    ports:
      - "5435:5432"
    volumes:
      - bookingpgdata:/var/lib/postgresql/data
      - ./services/booking/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  booking:
    build: ./services/booking
    # Shared JWT_SECRET (gitignored) so booking can VERIFY tokens auth issued.
    env_file:
      - ./services/booking/.env
    environment:
      DATABASE_URL: postgres://app:app@booking-postgres:5432/booking
      PORT: "3003"
    ports:
      - "3003:3003"
    depends_on:
      booking-postgres:
        condition: service_healthy
    volumes:
      - ./services/booking/src:/app/src

volumes:
  pgdata:
  authpgdata:
  bookingpgdata:
